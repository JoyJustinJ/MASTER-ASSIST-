<script>
  /* ---- Global state ---- */
  let timerOn = true;

  /* ---- Show server IP ---- */
  fetch('https://api.ipify.org?format=json')
    .then(r => r.json())
    .then(d => { document.getElementById('ipDisplay').textContent = d.ip; })
    .catch(() => { document.getElementById('ipDisplay').textContent = ''; });

  /* ---- Laravel parallel auth (non-blocking) ---- */
  async function loginLaravelAppThenContinue() {
    const data = {
      username: $("input[name='txtUserName']").val(),
      password: $("input[name='txtPassword']").val()
    };
    try {
      const response = await fetch('newapp/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify(data)
      });
      const result = await response.json();
      if (result.success) {
        console.log("App Login Success");
        continueAfterLogin(result.user);
      }
    } catch (error) {
      console.error("Error during login:", error);
    }
  }

  function continueAfterLogin(user) { /* post-login app hook */ }

  /* ---- Main login handler ---- */
  function userLogin() {
    $(".btn-ma-login").find("i").removeClass("fa-sign-in-alt").addClass("fa-cog fa-spin");

    setTimeout(function() {
      $(".btn-ma-login").find("i").removeClass("fa-cog fa-spin").addClass("fa-sign-in-alt");

      var username = $("#txtUserName").val().trim();
      var pwd = $("#txtPassword").val().trim();
      
      // Offline auth via store.js
      var users = MA.getAll('users');
      var user = users.find(function(u) { return u.username === username || u.email === username; });
      
      if (!user) {
        Swal.fire({ icon: "error", text: "Invalid username or password" });
        return;
      }
      if (user.password !== pwd) {
        Swal.fire({ icon: "error", text: "Invalid username or password" });
        return;
      }
      if (user.status === 'inactive') {
        Swal.fire({ icon: "error", text: "Account is inactive. Please contact administrator." });
        return;
      }

      // Login success
      Swal.fire({ title: "Login Successful", icon: "success", timer: 1200, showConfirmButton: false }).then(function() {
        // Clear old sessions
        ["get_pay_mode_1","country_state","state_district"].forEach(function(key) {
          if (localStorage.getItem(key) !== null) localStorage.removeItem(key);
        });
        
        // Log to audit
        MA.addAudit('User logged in: ' + user.name + ' (' + user.role + ')');
        
        window.location.href = "welcome.html";
      });
    }, 800);
  }

  /* ---- OTP countdown timer ---- */
  function timer(remaining) {
    var m = Math.floor(remaining / 60);
    var s = remaining % 60;
    m = m < 10 ? '0' + m : m;
    s = s < 10 ? '0' + s : s;
    document.getElementById('timer').innerHTML = m + ':' + s;
    remaining -= 1;
    if (remaining >= 0 && timerOn) {
      setTimeout(function() { timer(remaining); }, 1000);
      return;
    }
    if (!timerOn) { return; }
    document.getElementById('timer').innerHTML =
      "<a href='javascript:void(0)' class='resend_otp' style='color:#7957fb;'>Resend OTP</a>";
  }

  /* ---- Forgot password helpers ---- */
  function showForgotMsg(type, text) {
    var $msg = $("#forgotMsg");
    $msg.removeClass("forgot-msg-success forgot-msg-error");
    $msg.addClass(type === "success" ? "forgot-msg-success" : "forgot-msg-error");
    $msg.html((type === "success" ? "✓ " : "✗ ") + text);
    $msg.show();
  }

  function resetForgotModal() {
    $("#forgotMobile").val("");
    $("#forgotOtp").val("");
    $("#forgotMsg").hide();
    $("#forgotStep2").hide();
    $("#forgotUsersSection").hide();
    $("#forgotUsersBody").html("");
    $("#sendOtpBtn").prop("disabled", false).text("Send OTP");
    $("#verifyOtpBtn").prop("disabled", false).text("Verify OTP");
  }

  /* ---- Document ready ---- */
  $(document).ready(function() {

    /* Form submit */
    $("#form").submit(function(e) {
      e.preventDefault();
      userLogin();
    });

    /* OTP digit auto-advance */
    $(".otp__digit").on("input", function() {
      var val = $(this).val();
      if (val.length >= 1) {
        var next = $(this).closest(".otp-inputs").find(".otp__digit").eq($(this).index(".otp__digit") + 1);
        if (next.length) next.focus();
      }
    });

    /* OTP Verify */
    $("#otpVerifyBtn").on("click", function() {
      var otp = $("#otp1").val() + $("#otp2").val() + $("#otp3").val() + $("#otp4").val();
      if (otp.length < 4) { Swal.fire({ icon: "warning", text: "Please enter complete OTP" }); return; }
      $.ajax({
        url: "api-loginotpcheck.php",
        method: "POST",
        data: { otp: otp, token: $("#tokenid").val() },
        success: function(res) {
          try {
            var r = $.parseJSON(res);
            if (r.status === "200") { $(".popup").fadeOut(300); window.location.href = "welcome.php"; }
            else { Swal.fire({ icon: "error", text: r.message || "Invalid OTP" }); }
          } catch(e) { alert(res); }
        }
      });
    });

    /* OTP close */
    $("#otpClose").on("click", function() {
      $(".popup").fadeOut(300);
      timerOn = false;
    });

    /* Resend OTP */
    $(document).on("click", ".resend_otp", function() {
      $.ajax({
        url: "api-loginotp.php",
        type: "POST",
        data: { Token: $("#tokenid").val(), status: "resend" },
        success: function(data) {
          try {
            var r = $.parseJSON(data);
            if (r.status === "200") Swal.fire({ title: r.message, icon: "success", draggable: true });
            else Swal.fire({ icon: "error", text: r.message });
          } catch(e) { alert(data); }
        }
      });
      timerOn = true;
      timer(120);
    });

    /* Password toggle */
    $(document).on("click", ".js-password-toggle", function() {
      var targetId = $(this).data("target");
      var input = $("#" + targetId);
      if (input.attr("type") === "password") {
        input.attr("type", "text");
        $(this).find(".fa-eye").hide();
        $(this).find(".fa-eye-slash").show();
        $(this).attr("title", "Hide password");
      } else {
        input.attr("type", "password");
        $(this).find(".fa-eye").show();
        $(this).find(".fa-eye-slash").hide();
        $(this).attr("title", "Show password");
      }
    });

    /* Open forgot modal */
    $("#forgotPasswordToggle").on("click", function() {
      $("#forgotPasswordModal").addClass("active");
    });

    /* Close forgot modal */
    $("#forgotModalClose").on("click", function() {
      $("#forgotPasswordModal").removeClass("active");
      resetForgotModal();
    });

    /* Close on backdrop click */
    $("#forgotPasswordModal").on("click", function(e) {
      if ($(e.target).is("#forgotPasswordModal")) {
        $(this).removeClass("active");
        resetForgotModal();
      }
    });

    /* Send OTP */
    $("#sendOtpBtn").on("click", function() {
      var mobile = $("#forgotMobile").val().trim();
      if (!mobile || mobile.length < 10) { showForgotMsg("error", "Please enter a valid 10-digit mobile number."); return; }
      $(this).prop("disabled", true).text("Sending...");
      $.ajax({
        url: "forgot_password.php",
        method: "POST",
        data: { action: "send_otp", mobile: mobile },
        success: function(res) {
          try {
            var r = $.parseJSON(res);
            if (r.status === "ok" && r.msg_type === "success") {
              showForgotMsg("success", r.message || "OTP sent successfully.");
              $("#forgotStep2").show();
              $("#sendOtpBtn").prop("disabled", false).text("Resend OTP");
            } else {
              showForgotMsg("error", r.message || "Failed to send OTP.");
              $("#sendOtpBtn").prop("disabled", false).text("Send OTP");
            }
          } catch(e) { showForgotMsg("error", "Unexpected error."); $("#sendOtpBtn").prop("disabled", false).text("Send OTP"); }
        },
        error: function() { showForgotMsg("error", "Network error. Please try again."); $("#sendOtpBtn").prop("disabled", false).text("Send OTP"); }
      });
    });

    /* Verify OTP (forgot) */
    $("#verifyOtpBtn").on("click", function() {
      var mobile = $("#forgotMobile").val().trim();
      var otp = $("#forgotOtp").val().trim();
      if (!otp) { showForgotMsg("error", "Please enter the OTP."); return; }
      $(this).prop("disabled", true).text("Verifying...");
      $.ajax({
        url: "forgot_password.php",
        method: "POST",
        data: { action: "verify_otp", mobile: mobile, otp: otp },
        success: function(res) {
          try {
            var r = $.parseJSON(res);
            if (r.status === "ok") {
              showForgotMsg("success", "OTP verified.");
              if (r.users && r.users.length > 0) {
                $("#forgotMobileDisplay").text(mobile);
                var rows = "";
                r.users.forEach(function(u, i) {
                  rows += "<tr><td>" + (i+1) + "</td><td>" + u.username + "</td><td>" + u.password + "</td></tr>";
                });
                $("#forgotUsersBody").html(rows);
                $("#forgotUsersSection").show();
              }
              $("#verifyOtpBtn").prop("disabled", false).text("Verify OTP");
            } else {
              showForgotMsg("error", r.message || "Invalid OTP.");
              $("#verifyOtpBtn").prop("disabled", false).text("Verify OTP");
            }
          } catch(e) { showForgotMsg("error", "Unexpected error."); $("#verifyOtpBtn").prop("disabled", false).text("Verify OTP"); }
        }
      });
    });

  }); /* end ready */
